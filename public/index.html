<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONG NEVUS AFRICA | Excellence & Solidarité</title>
  <meta name="description" content="ONG NEVUS AFRICA - Inclusion sociale, médicale et humaine des personnes vivant avec des naevus congénitaux géants.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar" id="navbar"></nav>

  <header class="hero" id="hero-section"></header>

  <main>
    <!-- Section À propos -->
    <section class="section" id="about-section"></section>

    <!-- Section Missions -->
    <section class="section missions-section" id="missions-section">
      <div class="container">
        <h2 id="missions-title">Nos Missions</h2>
        <div class="missions-grid" id="missions-grid"></div>
      </div>
    </section>

    <!-- Section Programmes -->
    <section class="section programs-section" id="programs-section"></section>

    <!-- Section Contact -->
    <section class="section contact-section" id="contact-section">
      <div class="container">
        <h2>Nous Contacter</h2>
        <div class="contact-info" id="contact-info"></div>
        <div class="contact-form">
          <form id="contact-form">
            <input type="text" placeholder="Votre nom" required>
            <input type="email" placeholder="Votre email" required>
            <textarea placeholder="Votre message" rows="5" required></textarea>
            <button type="submit" class="btn">Envoyer</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 ONG NEVUS AFRICA. Tous droits réservés.</p>
      <p><a href="/admin">Accès Administrateur</a></p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
